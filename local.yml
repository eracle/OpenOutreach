# local.yml

services:
  app:
    build:
      context: .
      dockerfile: ./compose/linkedin/Dockerfile
      args:
        - BUILD_ENV=local
    restart: unless-stopped
    stdin_open: true
    tty: true
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    environment:
      - ENABLE_VNC=true
    volumes:
      - .:/app
    ports:
      - "6080:6080"
