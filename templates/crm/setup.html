<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Setup — OpenOutreach</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-lg border border-gray-200 p-8">
      <!-- Logo -->
      <div class="flex justify-center mb-4">
        <div class="w-14 h-14 bg-blue-600 rounded-xl flex items-center justify-center">
          <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
      </div>

      <h2 class="text-center text-2xl font-bold text-gray-900 mb-1">Welcome to OpenOutreach</h2>
      <p class="text-center text-sm text-gray-500 mb-6">Create your admin account to get started</p>

      <!-- Step indicator -->
      <div class="flex items-center justify-center gap-2 mb-6">
        <div class="flex items-center gap-1.5">
          <div class="w-7 h-7 rounded-full bg-blue-600 text-white flex items-center justify-center text-xs font-bold">1</div>
          <span class="text-xs font-medium text-blue-600">Admin Setup</span>
        </div>
        <div class="w-8 h-px bg-gray-300"></div>
        <div class="flex items-center gap-1.5">
          <div class="w-7 h-7 rounded-full bg-gray-200 text-gray-400 flex items-center justify-center text-xs font-bold">2</div>
          <span class="text-xs text-gray-400">Dashboard</span>
        </div>
      </div>

      {% if errors %}
      <div class="bg-red-50 border border-red-200 rounded-lg p-3 mb-4">
        {% for error in errors %}
        <p class="text-sm text-red-700">{{ error }}</p>
        {% endfor %}
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="space-y-4">
          <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Admin Username</label>
            <input type="text" name="username" id="username" required autofocus value="{{ request.POST.username }}"
              class="block w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 shadow-sm outline-none"
              placeholder="admin">
          </div>
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" id="password" required
              class="block w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 shadow-sm outline-none"
              placeholder="Min 6 characters">
          </div>
          <div>
            <label for="password2" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
            <input type="password" name="password2" id="password2" required
              class="block w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-blue-500 focus:ring-2 focus:ring-blue-200 shadow-sm outline-none"
              placeholder="Repeat password">
          </div>
          <button type="submit" class="w-full bg-blue-600 text-white rounded-lg py-2.5 text-sm font-semibold hover:bg-blue-700 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            Create Admin &amp; Get Started
          </button>
        </div>
      </form>

      <p class="text-xs text-gray-400 text-center mt-5">
        This is a one-time setup. You can add more users later from Settings.
      </p>
    </div>
  </div>
</body>
</html>
