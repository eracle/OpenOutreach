<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — OpenOutreach CRM</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="h-full flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="bg-white rounded-2xl shadow-lg border border-gray-200 p-8">
      <div class="flex justify-center mb-6">
        <div class="w-12 h-12 bg-blue-600 rounded-xl flex items-center justify-center">
          <svg class="w-7 h-7 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
        </div>
      </div>
      <h2 class="text-center text-xl font-bold text-gray-900 mb-1">OpenOutreach CRM</h2>
      <p class="text-center text-sm text-gray-500 mb-6">Sign in to your account</p>
      {% if form.errors %}
      <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg p-3 mb-4 text-sm">
        Invalid username or password.
      </div>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="space-y-4">
          <div>
            <label for="id_username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" name="username" id="id_username" required autofocus
              class="block w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-blue-500 focus:ring-blue-500 shadow-sm">
          </div>
          <div>
            <label for="id_password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" name="password" id="id_password" required
              class="block w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-blue-500 focus:ring-blue-500 shadow-sm">
          </div>
          <button type="submit" class="w-full bg-blue-600 text-white rounded-lg py-2.5 text-sm font-semibold hover:bg-blue-700 transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            Sign in
          </button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
